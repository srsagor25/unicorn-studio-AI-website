<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" role="img" aria-label="B2B SaaS content engine case study">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset=".55" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <radialGradient id="glow1" cx=".15" cy=".2" r=".7">
      <stop offset="0" stop-color="#22d3ee" stop-opacity=".55"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx=".85" cy=".85" r=".6">
      <stop offset="0" stop-color="#a78bfa" stop-opacity=".5"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".05"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset=".5" stop-color="#38bdf8" stop-opacity=".7"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  <rect width="1200" height="800" fill="url(#glow1)"/>
  <rect width="1200" height="800" fill="url(#glow2)"/>

  <!-- Eyebrow -->
  <g transform="translate(80,90)">
    <rect width="220" height="34" rx="17" fill="#ffffff" fill-opacity=".1" stroke="#ffffff" stroke-opacity=".18"/>
    <circle cx="20" cy="17" r="4" fill="#22d3ee"/>
    <text x="36" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#bae6fd">CASE · AI MARKETING SYSTEM</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80,160)">
    <text font-family="Inter, system-ui, sans-serif" fill="#ffffff">
      <tspan x="0" y="60" font-size="68" font-weight="800" letter-spacing="-2">A B2B SaaS founder reclaimed</tspan>
      <tspan x="0" y="138" font-size="68" font-weight="800" letter-spacing="-2" fill="url(#accent)">12 hours a week</tspan>
      <tspan x="0" y="215" font-size="68" font-weight="800" letter-spacing="-2">by rebuilding the</tspan>
      <tspan x="0" y="293" font-size="68" font-weight="800" letter-spacing="-2">content engine.</tspan>
    </text>
  </g>

  <!-- Animated arrow line -->
  <line x1="80" y1="500" x2="700" y2="500" stroke="url(#line)" stroke-width="2"/>

  <!-- Metric cards -->
  <g transform="translate(80,540)">
    <g>
      <rect width="240" height="170" rx="20" fill="url(#card)" stroke="#ffffff" stroke-opacity=".15"/>
      <text x="24" y="48" font-family="ui-monospace, monospace" font-size="11" font-weight="700" letter-spacing="2" fill="#7dd3fc">FOUNDER TIME</text>
      <text x="24" y="100" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#ffffff" letter-spacing="-1">14h → 2h</text>
      <text x="24" y="138" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#cbd5e1">per week on content</text>
    </g>
    <g transform="translate(260,0)">
      <rect width="240" height="170" rx="20" fill="url(#card)" stroke="#ffffff" stroke-opacity=".15"/>
      <text x="24" y="48" font-family="ui-monospace, monospace" font-size="11" font-weight="700" letter-spacing="2" fill="#7dd3fc">OUTPUT</text>
      <text x="24" y="100" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#ffffff" letter-spacing="-1">3×</text>
      <text x="24" y="138" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#cbd5e1">across all channels</text>
    </g>
    <g transform="translate(520,0)">
      <rect width="240" height="170" rx="20" fill="url(#card)" stroke="#ffffff" stroke-opacity=".15"/>
      <text x="24" y="48" font-family="ui-monospace, monospace" font-size="11" font-weight="700" letter-spacing="2" fill="#7dd3fc">TIMELINE</text>
      <text x="24" y="100" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#ffffff" letter-spacing="-1">4 wk</text>
      <text x="24" y="138" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#cbd5e1">build to running</text>
    </g>
  </g>

  <!-- Right cluster: channel icons -->
  <g transform="translate(820,140)">
    <!-- LinkedIn -->
    <g transform="translate(0,0)">
      <rect width="120" height="120" rx="28" fill="#ffffff" fill-opacity=".08" stroke="#ffffff" stroke-opacity=".18"/>
      <text x="60" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#7dd3fc">in</text>
    </g>
    <!-- X -->
    <g transform="translate(135,40)">
      <rect width="120" height="120" rx="28" fill="#ffffff" fill-opacity=".08" stroke="#ffffff" stroke-opacity=".18"/>
      <text x="60" y="80" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="#ffffff">𝕏</text>
    </g>
    <!-- Reddit -->
    <g transform="translate(0,140)">
      <rect width="120" height="120" rx="28" fill="#ffffff" fill-opacity=".08" stroke="#ffffff" stroke-opacity=".18"/>
      <circle cx="60" cy="64" r="36" fill="none" stroke="#ffffff" stroke-opacity=".7" stroke-width="3"/>
      <circle cx="46" cy="60" r="5" fill="#a78bfa"/>
      <circle cx="74" cy="60" r="5" fill="#a78bfa"/>
      <path d="M 44 78 Q 60 90 76 78" stroke="#7dd3fc" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Blog -->
    <g transform="translate(135,180)">
      <rect width="120" height="120" rx="28" fill="#ffffff" fill-opacity=".08" stroke="#ffffff" stroke-opacity=".18"/>
      <rect x="32" y="40" width="56" height="6" rx="3" fill="#7dd3fc"/>
      <rect x="32" y="56" width="56" height="6" rx="3" fill="#ffffff" fill-opacity=".5"/>
      <rect x="32" y="72" width="40" height="6" rx="3" fill="#ffffff" fill-opacity=".5"/>
      <rect x="32" y="88" width="56" height="6" rx="3" fill="#ffffff" fill-opacity=".5"/>
    </g>
  </g>

  <!-- Connector lines from "engine" to channels -->
  <g stroke="url(#accent)" stroke-width="2" fill="none" opacity=".5">
    <path d="M 760 320 C 800 320 800 200 880 200" stroke-dasharray="6 6"/>
    <path d="M 760 320 C 800 320 800 240 1015 240" stroke-dasharray="6 6"/>
    <path d="M 760 320 C 800 320 800 340 880 340" stroke-dasharray="6 6"/>
    <path d="M 760 320 C 800 320 800 380 1015 380" stroke-dasharray="6 6"/>
  </g>

  <!-- Single source node -->
  <g transform="translate(680,275)">
    <circle cx="40" cy="40" r="44" fill="url(#accent)" opacity=".22" filter="url(#soft)"/>
    <circle cx="40" cy="40" r="32" fill="#0f172a" stroke="url(#accent)" stroke-width="2"/>
    <text x="40" y="46" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="-.5">ONE</text>
  </g>
  <text x="690" y="395" font-family="ui-monospace, monospace" font-size="11" font-weight="700" letter-spacing="2" fill="#bae6fd">INPUT → MANY</text>
</svg>
